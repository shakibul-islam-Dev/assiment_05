<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts Init -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Diasy And Tailwindcss -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Custom css init -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>GitHub Issues Tracker</title>
  </head>
  <body>
  <nav class="container mx-auto px-4 py-4 flex flex-col gap-4 sm:flex-row items-center justify-between">
    <div id="nav-start" class="flex items-center gap-4">
      <img class="w-10" src="./assets/github-logo.png" alt="Logo" />
      <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
    </div>

    <div id="nav-end" class="flex items-center gap-2">
      <div id="search-parent">
        <label class="input input-bordered flex items-center gap-2">
          <input type="text" id="search-input" class="grow outline-none border-none" placeholder="search issues" required />
        </label>
      </div>
      <button id="search-btn" class="btn btn-primary">Search</button>
    </div>
  </nav>

  <section id="toggle-section" class="container mx-auto px-4 pt-10 flex flex-wrap items-center justify-between gap-4">
    <div class="toggle-btns text-[16px] font-semibold flex gap-2">
      <button id="all" onclick="toggle('all')" class="btn bg-blue-700 text-white hover:bg-blue-800">All</button>
      <button id="open" onclick="toggle('open')" class="btn">Open</button>
      <button id="closed" onclick="toggle('closed')" class="btn">Closed</button>
    </div>
  </section>

  <section class="container mx-auto px-4 pt-10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div class="issue flex items-start flex-col">
      <div class="flex items-center gap-2">
        <img src="./assets/Aperture.png" alt="Aperture icon" />
        <div class="text-2xl font-semibold">
          <span id="issue" class="px-1">0</span> issues
        </div>
      </div>
      <p class="text-base text-gray-400">Track and manage your project issues</p>
    </div>
    
    <div class="flex items-center gap-6 text-xl font-bold">
      <div class="flex items-center gap-2 text-green-600">
        <i class="fa-solid fa-circle text-xs"></i><span>Open</span>
      </div>
      <div class="flex items-center gap-2 text-violet-600">
        <i class="fa-solid fa-circle text-xs"></i><span>Closed</span>
      </div>
    </div>
  </section>

  <div class="flex justify-center my-10">
    <span id="spiner" class="loading loading-dots loading-lg hidden"></span>
  </div>

  <section id="cards" class="container mx-auto px-4 pb-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    </section>

  <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box p-0 w-11/12 mx-auto max-w-2xl overflow-x-hidden">
      <div id="modal_container"></div>
    </div>
  </dialog>

  <script src="./app.js" defer></script>
  <script src="./loging.js" defer></script>
</body>
</html>
