<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts Init -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Diasy And Tailwindcss -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Custom css init -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>GitHub Issues Tracker</title>
  </head>
  <body>
    <nav class="mx-auto px-4 py-2 flex items-center justify-between">
      <div id="nav-menu" class="hidden">eeeeeeeeeeeeee</div>
      <div id="nav-start" class="flex items-center gap-4">
        <img class="w-10" src="./assets/github-logo.png" alt="" />
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      </div>

      <div id="nav-end" class="nav-end">
        <div id="search" class="">
          <input type="text" />
          <button id="search" class="cursor-pointer">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
      </div>
    </nav>
    <section id="toggle" class="container mx-auto pt-10">
      <div class="toggle-btns text-[16px] font-semibold">
        <button
          id="all"
          onclick="toggle('all')"
          class="btn bg-blue-700 text-white"
        >
          All
        </button>
        <button id="open" onclick="toggle('open')" class="btn">Open</button>
        <button id="closed" onclick="toggle('closed')" class="btn">
          Closed
        </button>
      </div>
    </section>
    <!-- Issues Items -->
    <section
      class="container mx-auto pt-10 flex flex-col sm:flex-row justify-between space-y-2"
    >
      <div class="issue px-2 flex items-start flex-col">
        <div class="flex items-center">
          <div><img src="./assets/Aperture.png" alt="Aperture" /></div>
          <div class="text-2xl font-semibold">
            <span id="issue" class="px-2"></span>issues
          </div>
        </div>
        <p class="text-[16px] text-gray-400">
          Track and manage your project issues
        </p>
      </div>
      <div class="flex items-start gap-4 text-xl font-bold">
        <div class="">
          <span class="px-2 text-green-600"
            ><i class="fa-solid fa-circle"></i></span
          >Open
        </div>
        <div class="gap-1">
          <span class="px-2 text-violet-600"
            ><i class="fa-solid fa-circle"></i></span
          >Closed
        </div>
      </div>
    </section>
    <!-- Cards Div -->
    <section
      class="mt-4 py-10 border-t-1 border-t-gray-200 container mx-auto p-4"
    >
      <div id="cards" class="cards grid grid-cols-1 sm:grid-cols-4 gap-4"></div>
    </section>
    <!-- filter div -->
    <section
      class="mt-4 py-10 border-t-1 border-t-gray-200 container mx-auto p-4"
    >
      <div
        id="filter-container"
        class="grid grid-cols-1 sm:grid-cols-4 gap-4"
      ></div>
    </section>
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div id="modal_container"></div>
    </dialog>
    <script src="./app.js" defer></script>
    <script src="./loging.js" defer></script>
    <!-- <script src="./demo.js"></script> -->
  </body>
</html>
