<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts Init -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Diasy And Tailwindcss -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Custom css init -->
    <link rel="stylesheet" href="./style.css" />
    <title>GitHub Issues Login</title>
  </head>
  <body>
    <div class="logo-uper">
      <img src="./assets/github-logo.png" alt="" />
      <h2>GitHub Issues Tracker</h2>
      <p>Sign in to manager your issues</p>
    </div>
    <div>
      <fieldset
        class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4"
      >
        <label class="label">Username</label>
        <input
          id="user_Id"
          type="email"
          value=""
          class="input"
          maxlength="6"
          placeholder="Enter Username"
        />
        <label for="Username">Defalut:adimn</label>

        <label class="label">Password</label>
        <input
          id="user_password"
          type="password"
          value=""
          class="input"
          maxlength="9"
          placeholder="Enter Password"
        />
        <label for="password">Defalut:adimn123</label>
        <label class="flex items-center gap-2 mt-2 cursor-pointer">
          <input
            type="checkbox"
            id="remember-me"
            class="checkbox checkbox-xs"
          />
          <span class="label-text">Remember me</span>
        </label>

        <button id="login-btn" class="btn btn-neutral mt-4">Sign In</button>
      </fieldset>
    </div>
    <span>or</span>
    <div class="credentials">
      <label for="Demo Credentials">Demo Credentials:</label>

      <h2>Username: admin</h2>
      <p>Password: admin123</p>
    </div>
    <dialog id="my_modal_3" class="modal">
      <div class="modal-box">
        <form method="dialog">
          <button
            class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2"
          >
            ✕
          </button>
        </form>
        <h3 class="text-lg font-bold">Congratulations!</h3>
        <p class="py-4">Login Sucess</p>
      </div>
    </dialog>
    <script src="./app.js" defer></script>
  </body>
</html>
