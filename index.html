<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts Init -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Diasy And Tailwindcss -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Custom css init -->
    <link rel="stylesheet" href="./style.css" />
    <title>GitHub Issues Login</title>
  </head>
  <body>
    <main
      class="flex items-center justify-center flex-col container mx-auto mt-20"
    >
      <div class="logo-uper text-center">
        <img class="mx-auto" src="./assets/github-logo.png" alt="" />
        <h2 class="text-4xl pt-4 font-bold text-[#1F2937]">
          GitHub Issues Tracker
        </h2>
        <p class="text-xl font-normal text-gray-500">
          Sign in to manager your issues
        </p>
      </div>
      <div>
        <fieldset
          class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4"
        >
          <label class="label text-[16px] pt-4 font-medium text-[#1F2937]"
            >Username</label
          >
          <input
            id="user_Id"
            type="email"
            value=""
            class="input outline-none"
            maxlength="6"
            placeholder="Enter Username"
          />
          <label for="Username" class="text-[#4A00FF] text-[14px]"
            >Defalut:adimn</label
          >

          <label class="label label text-[16px] pt-4 font-medium text-[#1F2937]"
            >Password</label
          >
          <input
            id="user_password"
            type="password"
            value=""
            class="input outline-none"
            maxlength="9"
            placeholder="Enter Password"
          />
          <label for="password" class="text-[#4A00FF] text-[14px]"
            >Defalut:adimn123</label
          >
          <label class="flex items-center gap-2 mt-2 cursor-pointer">
            <input
              type="checkbox"
              id="remember-me"
              class="checkbox checkbox-sm inline-block"
            />
            <span
              class="label-text text-[16px] font-medium inline-block text-[#1F2937]"
            >
              Remember me</span
            >
          </label>

          <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
      </div>
      <span>or</span>
      <div class="credentials flex flex-col items-center justify-center">
        <label
          for="Demo Credentials "
          class="text-[18px] font-medium inline-block text-[#1F2937]"
          >Demo Credentials:</label
        >

        <h2 class="text-[16px] font-normal inline-block text-gray-600">
          Username: admin
        </h2>
        <p class="text-[16px] font-normal inline-block text-gray-600">
          Password: admin123
        </p>
      </div>
    </main>
    <!-- Modal  -->
    <dialog id="my_modal_3" class="modal">
      <div class="modal-box">
        <form method="dialog">
          <button
            class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2"
          >
            ✕
          </button>
        </form>
        <h3 class="text-lg font-bold">Congratulations!</h3>
        <p class="py-4">Login Sucess</p>
      </div>
    </dialog>
    <script src="./app.js" defer></script>
    <script src="./loging.js" defer></script>
  </body>
</html>
